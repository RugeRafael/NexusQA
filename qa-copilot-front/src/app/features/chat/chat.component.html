<div class="chat-page">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="chat-title">
      <div class="ai-avatar">
        <mat-icon>smart_toy</mat-icon>
      </div>
      <div>
        <h1>Chat QA Copilot</h1>
        <p>Asistente IA especializado en ISTQB e ISO 29119</p>
      </div>
    </div>
    <button mat-stroked-button (click)="clearChat()">
      <mat-icon>refresh</mat-icon>
      Nueva conversación
    </button>
  </div>

  <div class="chat-container">

    <!-- QUICK ACTIONS - solo al inicio -->
    <div class="quick-actions-bar" *ngIf="messages.length <= 1">
      <div class="qa-label">Acciones rápidas</div>
      <div class="qa-chips">
        <button class="qa-chip" *ngFor="let a of quickActions" (click)="useQuickAction(a)">
          {{ a.label }}
        </button>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="messages-area" #messagesContainer>
      <div class="message-wrapper"
        *ngFor="let msg of messages"
        [class.user-wrapper]="msg.role === 'user'">

        <div class="message-avatar" *ngIf="msg.role === 'assistant'">
          <mat-icon>smart_toy</mat-icon>
        </div>

        <div class="message-bubble"
          [class.user-bubble]="msg.role === 'user'"
          [class.assistant-bubble]="msg.role === 'assistant'">
          <div class="message-content"
            *ngIf="msg.role === 'assistant'"
            [innerHTML]="renderMarkdown(msg.content)">
          </div>
          <div class="message-content" *ngIf="msg.role === 'user'">
            {{ msg.content }}
          </div>
          <div class="message-time">{{ formatTime(msg.sentAt) }}</div>
        </div>

        <div class="message-avatar user-avatar-icon" *ngIf="msg.role === 'user'">
          <mat-icon>person</mat-icon>
        </div>
      </div>

      <!-- TYPING INDICATOR -->
      <div class="message-wrapper" *ngIf="sending">
        <div class="message-avatar">
          <mat-icon>smart_toy</mat-icon>
        </div>
        <div class="message-bubble assistant-bubble typing-bubble">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- INPUT AREA -->
    <div class="chat-input-area">

      <!-- Sugerencias cuando el chat está vacío -->
      <div class="input-suggestions" *ngIf="messages.length <= 1">
        <button class="suggestion-chip"
          *ngFor="let s of suggestions"
          (click)="form.patchValue({message: s}); sendMessage()">
          {{ s }}
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="sendMessage()" class="input-form">
        <mat-form-field appearance="outline" class="message-input chat-input">
          <textarea matInput
            formControlName="message"
            placeholder="Escribe tu pregunta sobre QA, ISTQB o ISO 29119... (puedes dar información incompleta, te ayudo a completarla)"
            rows="2"
            (keydown)="onKeyDown($event)">
          </textarea>
        </mat-form-field>
        <button mat-fab color="primary" type="submit"
          [disabled]="form.invalid || sending" class="send-btn">
          <mat-spinner diameter="20" *ngIf="sending"></mat-spinner>
          <mat-icon *ngIf="!sending">send</mat-icon>
        </button>
      </form>
      <div class="input-hint">
        Presiona <kbd>Enter</kbd> para enviar · <kbd>Shift+Enter</kbd> para nueva línea
      </div>
    </div>

  </div>
</div>
